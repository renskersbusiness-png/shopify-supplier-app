<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; font-size: 14px; line-height: 1.5; }
    button { cursor: pointer; font-family: inherit; }

    /* Top bar */
    .topbar { background: #111827; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-brand { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .topbar-user  { font-size: 13px; color: #9ca3af; display: flex; align-items: center; gap: 12px; }

    .content { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

    /* Stat row */
    .stats-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 120px; }
    .stat-label { font-size: 11px; font-weight: 500; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 24px; font-weight: 700; color: #111827; margin-top: 2px; }

    /* Filter tabs */
    .filter-tabs-wrapper { position: sticky; top: 0; z-index: 100; background: #f8fafc; padding: 10px 0 10px; margin-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
    .filter-tabs { display: flex; gap: 4px; background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 6px; width: fit-content; }
    .filter-tab { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; border: none; background: none; color: #6b7280; transition: all 0.12s; }
    .filter-tab:hover { background: #f3f4f6; }
    .filter-tab.active { background: #6366f1; color: white; }

    /* Order cards */
    .order-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
    .order-card-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f3f4f6; cursor: pointer; user-select: none; }
    .order-card-header:hover { background: #f9fafb; }
    .order-num { font-weight: 700; font-size: 15px; }
    .order-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .order-card-body { padding: 18px; display: none; }
    .order-card-body.open { display: block; }

    /* Line items in order */
    .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f9fafb; border-radius: 8px; margin-bottom: 6px; }
    .item-info { flex: 1; }
    .item-title { font-weight: 500; }
    .item-sub   { font-size: 12px; color: #9ca3af; }

    /* Tracking form */
    .tracking-form { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-top: 14px; background: white; }
    .tracking-form h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .form-group { flex: 1; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; background: white;
    }
    .form-group input:focus, .form-group select:focus { border-color: #6366f1; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid transparent; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #6366f1; color: white; border-color: #6366f1; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-success { background: #10b981; color: white; border-color: #10b981; }
    .btn-success:hover { background: #059669; }
    .btn-secondary { background: white; color: #374151; border-color: #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: block; }
    .badge-assigned      { background: #dbeafe; color: #2563eb; } .badge-assigned::before      { background: #2563eb; }
    .badge-tracking_added{ background: #ede9fe; color: #7c3aed; } .badge-tracking_added::before{ background: #7c3aed; }
    .badge-fulfilled     { background: #d1fae5; color: #059669; } .badge-fulfilled::before     { background: #059669; }
    .badge-unassigned    { background: #f3f4f6; color: #6b7280; } .badge-unassigned::before    { background: #9ca3af; }

    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #1e40af; margin-bottom: 14px; }
    .success-box { background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #065f46; margin-bottom: 14px; }
    .warn-box { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #9a3412; margin-bottom: 14px; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #111827; color: white; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #065f46; }
    .toast.error   { background: #7f1d1d; }

    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty h3 { font-size: 15px; color: #6b7280; margin-bottom: 6px; }

    /* View switcher */
    .view-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 6px; width: fit-content; }
    .view-tab { padding: 7px 18px; border-radius: 7px; font-size: 13px; font-weight: 500; border: none; background: none; color: #6b7280; transition: all 0.12s; }
    .view-tab:hover { background: #f3f4f6; }
    .view-tab.active { background: #6366f1; color: white; }

    /* Inventory table */
    .inv-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .inv-table th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    .inv-table td { padding: 11px 14px; border-bottom: 1px solid #f3f4f6; font-size: 13px; vertical-align: middle; }
    .inv-table tr:last-child td { border-bottom: none; }
    .inv-table tr:hover td { background: #fafafa; }
    .inv-qty-input { width: 80px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .inv-qty-input:focus { border-color: #6366f1; }
    .synced-at { font-size: 11px; color: #9ca3af; }
  </style>
</head>
<body>

<!-- ── Top bar ────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-brand">📦 <span>Supplier Portal</span></div>
  <div class="topbar-user">
    <span id="supplier-name">Loading…</span>
    <form method="POST" action="/logout" style="margin:0">
      <button type="submit" style="background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer">Log out</button>
    </form>
  </div>
</div>

<div class="content">

  <!-- View switcher -->
  <div class="view-tabs">
    <button class="view-tab active" id="view-tab-orders" onclick="showView('orders', this)">📋 Orders</button>
    <button class="view-tab" id="view-tab-inventory" onclick="showView('inventory', this)">📦 Inventory</button>
  </div>

  <!-- ── Orders view ─────────────────────────────────────────────────────── -->
  <div id="view-orders">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Assigned</div><div class="stat-value" id="stat-assigned">—</div></div>
      <div class="stat-card"><div class="stat-label">Tracking Added</div><div class="stat-value" id="stat-tracking">—</div></div>
      <div class="stat-card"><div class="stat-label">Fulfilled</div><div class="stat-value" id="stat-fulfilled">—</div></div>
    </div>

    <!-- Filter tabs (sticky) -->
    <div class="filter-tabs-wrapper">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('', this)">All</button>
        <button class="filter-tab" onclick="setFilter('assigned', this)">To Do</button>
        <button class="filter-tab" onclick="setFilter('tracking_added', this)">Tracking Added</button>
        <button class="filter-tab" onclick="setFilter('fulfilled', this)">Fulfilled</button>
      </div>
    </div>

    <!-- Orders list -->
    <div id="orders-list">
      <div style="text-align:center;padding:40px;color:#9ca3af">Loading…</div>
    </div>
  </div>

  <!-- ── Inventory view ──────────────────────────────────────────────────── -->
  <div id="view-inventory" style="display:none">
    <div id="inv-location-warning" style="display:none" class="warn-box">
      ⚠️ Inventory sync is not yet configured. Stock updates will be saved locally but cannot be synced to Shopify. Please contact your admin.
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:700">Your Inventory</div>
        <div style="font-size:13px;color:#6b7280;margin-top:2px">Update stock quantities and sync to Shopify.</div>
      </div>
      <button class="btn btn-primary btn-sm" id="sync-all-btn" onclick="syncAllInventory(this)" style="display:none">
        ↑ Sync All to Shopify
      </button>
    </div>
    <div id="inv-list">
      <div style="text-align:center;padding:40px;color:#9ca3af">Loading…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentFilter = '';
// Map of order_id → tracking form state
const trackingState = {};

document.addEventListener('DOMContentLoaded', async () => {
  await loadMe();
  await loadAssignments();
});

async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (res.status === 401) { window.location.href = '/login'; throw new Error('Unauthenticated'); }
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function statusBadge(s) { return `<span class="badge badge-${esc(s)}">${esc(s.replace('_',' '))}</span>`; }
function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

async function loadMe() {
  try {
    const r = await api('/api/supplier/me');
    document.getElementById('supplier-name').textContent = r.supplierName || 'Supplier';
  } catch(e) {}
}

async function loadAssignments() {
  const list = document.getElementById('orders-list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">Loading…</div>';
  try {
    const params = new URLSearchParams();
    if (currentFilter) params.set('status', currentFilter);
    const r = await api(`/api/supplier/assignments?${params}`);
    const stats = r.stats || {};
    document.getElementById('stat-assigned').textContent  = stats.assigned  || 0;
    document.getElementById('stat-tracking').textContent  = stats.tracking_added || 0;
    document.getElementById('stat-fulfilled').textContent = stats.fulfilled  || 0;

    const rows = r.assignments || [];
    if (!rows.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><h3>${currentFilter ? 'No items in this category' : 'No items assigned yet'}</h3><p style="font-size:13px">Items appear here when assigned to you for fulfillment.</p></div>`;
      return;
    }

    // Group by order
    const orderMap = new Map();
    for (const a of rows) {
      if (!orderMap.has(a.order_id)) {
        orderMap.set(a.order_id, {
          order_id:        a.order_id,
          shopify_order_num: a.shopify_order_num,
          customer_name:   a.customer_name,
          created_at:      a.order_created_at,
          items:           [],
        });
      }
      orderMap.get(a.order_id).items.push(a);
    }

    list.innerHTML = [...orderMap.values()].map(group => renderOrderCard(group)).join('');
  } catch(e) {
    list.innerHTML = `<div style="color:#ef4444;padding:20px;text-align:center">Error: ${esc(e.message)}</div>`;
  }
}

function renderOrderCard(group) {
  const items      = group.items;
  const allStatuses = [...new Set(items.map(i => i.status))];
  const hasTracking = items[0]?.tracking_number;
  const isFulfilled = items.every(i => i.status === 'fulfilled');

  // Pre-fill tracking state
  if (!trackingState[group.order_id]) {
    trackingState[group.order_id] = {
      number:  items[0]?.tracking_number  || '',
      carrier: items[0]?.tracking_carrier || '',
      url:     items[0]?.tracking_url     || '',
    };
  }
  const ts = trackingState[group.order_id];

  let shippingBlock = '';
  try {
    const addr = JSON.parse(items[0]?.shipping_address || 'null');
    if (addr) {
      const line2 = [addr.address2].filter(Boolean).join('');
      shippingBlock = `
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px">
          <div style="font-weight:600;color:#065f46;margin-bottom:6px">📦 Ship to</div>
          <div style="color:#1f2937;line-height:1.6">
            <strong>${esc(addr.name||'')}</strong><br>
            ${esc(addr.address1||'')}${line2 ? '<br>'+esc(line2) : ''}<br>
            ${esc(addr.city||'')}${addr.province_code ? ', '+esc(addr.province_code) : ''} ${esc(addr.zip||'')}<br>
            ${esc(addr.country||'')}
            ${addr.phone ? `<br><a href="tel:${esc(addr.phone)}" style="color:#065f46">${esc(addr.phone)}</a>` : ''}
          </div>
        </div>
      `;
    }
  } catch(_) {}

  const itemRows = items.map(a => `
    <div class="item-row">
      <div class="item-info">
        <div class="item-title">${esc(a.title)}${a.variant_title ? ` <span style="color:#9ca3af;font-size:12px">— ${esc(a.variant_title)}</span>` : ''}</div>
        <div class="item-sub">SKU: ${esc(a.sku||'—')} · Qty: ${a.quantity}</div>
      </div>
      ${statusBadge(a.status)}
    </div>
  `).join('');

  const trackingSection = isFulfilled ? `
    <div class="success-box" style="margin-top:14px">
      ✅ Fulfilled — <strong>${esc(items[0]?.tracking_carrier||'')}</strong> ${esc(items[0]?.tracking_number||'')}
      ${items[0]?.tracking_url ? `<a href="${esc(items[0].tracking_url)}" target="_blank" style="color:#065f46;margin-left:8px">Track →</a>` : ''}
    </div>
  ` : `
    <div class="tracking-form" id="tracking-form-${group.order_id}">
      <h3>📦 Tracking Information</h3>
      ${hasTracking ? `<div class="success-box">Tracking saved — <strong>${esc(ts.carrier)}</strong> ${esc(ts.number)}</div>` : ''}
      <div class="form-row">
        <div class="form-group">
          <label>Carrier *</label>
          <select id="carrier-${group.order_id}" onchange="trackingState[${group.order_id}].carrier=this.value">
            <option value="">Select carrier…</option>
            ${['DHL','FedEx','UPS','USPS','ePacket','China Post','SF Express','Cainiao','Yanwen','4PX','Other'].map(c =>
              `<option value="${c}"${ts.carrier===c?' selected':''}>${c}</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Tracking Number *</label>
          <input type="text" id="tn-${group.order_id}" value="${esc(ts.number)}" placeholder="e.g. 1Z999AA10123456784" oninput="trackingState[${group.order_id}].number=this.value">
        </div>
      </div>
      <div class="form-group">
        <label>Tracking URL <span style="color:#9ca3af">(optional)</span></label>
        <input type="url" id="tu-${group.order_id}" value="${esc(ts.url)}" placeholder="https://track.carrier.com/…" oninput="trackingState[${group.order_id}].url=this.value">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-sm" onclick="saveTracking(${group.order_id}, this)">
          ${hasTracking ? 'Update Tracking' : 'Save Tracking'}
        </button>
        ${hasTracking ? `
          <button class="btn btn-success btn-sm" onclick="fulfillOrder(${group.order_id}, this)">
            ✅ Mark as Shipped in Shopify
          </button>` : ''}
      </div>
    </div>
  `;

  return `
    <div class="order-card">
      <div class="order-card-header" onclick="toggleOrder(${group.order_id})">
        <div>
          <div class="order-num">${esc(group.shopify_order_num)}</div>
          <div class="order-meta">${esc(group.customer_name||'—')} · ${items.length} item(s) · ${fmtDate(group.created_at)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${isFulfilled ? '<span class="badge badge-fulfilled">Fulfilled</span>' : (hasTracking ? '<span class="badge badge-tracking_added">Tracking Added</span>' : '<span class="badge badge-assigned">Action needed</span>')}
          <span style="color:#9ca3af;font-size:16px" id="chevron-${group.order_id}">▼</span>
        </div>
      </div>
      <div class="order-card-body" id="order-body-${group.order_id}">
        ${shippingBlock}
        ${itemRows}
        ${trackingSection}
      </div>
    </div>
  `;
}

function toggleOrder(orderId) {
  const body    = document.getElementById('order-body-' + orderId);
  const chevron = document.getElementById('chevron-' + orderId);
  const card    = body.closest('.order-card');
  const cardTop = card.getBoundingClientRect().top;

  const isOpen = body.classList.toggle('open');
  chevron.textContent = isOpen ? '▲' : '▼';

  // If closing a card that's above the current viewport, prevent the jump
  if (!isOpen && cardTop < 0) {
    window.scrollBy(0, -body.offsetHeight);
  }
}

function setFilter(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  loadAssignments();
}

async function saveTracking(orderId, btn) {
  const ts = trackingState[orderId];
  if (!ts.number?.trim() || !ts.carrier) {
    toast('Carrier and tracking number are required', 'error');
    return;
  }
  btn.disabled = true;
  const orig   = btn.textContent;
  btn.textContent = 'Saving…';
  try {
    await api('/api/supplier/tracking', {
      method: 'PATCH',
      body: JSON.stringify({
        order_id:         orderId,
        tracking_number:  ts.number.trim(),
        tracking_carrier: ts.carrier,
        tracking_url:     ts.url?.trim() || null,
      }),
    });
    toast('Tracking saved!', 'success');
    await loadAssignments();
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = orig;
  }
}

async function fulfillOrder(orderId, btn) {
  if (!confirm('Submit this shipment to Shopify? The customer will receive a shipping notification email.')) return;
  btn.disabled    = true;
  btn.textContent = 'Submitting…';
  try {
    await api('/api/supplier/fulfill', {
      method: 'POST',
      body: JSON.stringify({ order_id: orderId }),
    });
    toast('Order fulfilled! Customer notified.', 'success');
    await loadAssignments();
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = '✅ Mark as Shipped in Shopify';
  }
}

// ── View switcher ───────────────────────────────────────────────────────────

let invHasLocation = false;

function showView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-orders').style.display    = view === 'orders'    ? '' : 'none';
  document.getElementById('view-inventory').style.display = view === 'inventory' ? '' : 'none';
  if (view === 'inventory') loadInventory();
}

// ── Inventory view ──────────────────────────────────────────────────────────

// stock edits buffered here: skuId → qty (string)
const invEdits = {};

async function loadInventory() {
  const list = document.getElementById('inv-list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">Loading…</div>';
  try {
    const r = await api('/api/supplier/inventory');
    invHasLocation = r.has_shopify_location;

    document.getElementById('inv-location-warning').style.display = invHasLocation ? 'none' : '';
    document.getElementById('sync-all-btn').style.display = invHasLocation ? '' : 'none';

    const skus = r.skus || [];
    if (!skus.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><h3>No SKUs assigned yet</h3><p style="font-size:13px">Ask your admin to add your product catalog.</p></div>`;
      return;
    }

    list.innerHTML = `
      <table class="inv-table">
        <thead>
          <tr>
            <th>SKU</th>
            <th>Product</th>
            <th style="width:110px">Stock Qty</th>
            <th style="width:130px">Last Synced</th>
            <th style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody id="inv-tbody">
          ${skus.map(s => renderSkuRow(s)).join('')}
        </tbody>
      </table>
    `;
  } catch(e) {
    list.innerHTML = `<div style="color:#ef4444;padding:20px;text-align:center">Error: ${esc(e.message)}</div>`;
  }
}

function renderSkuRow(s) {
  const currentQty = invEdits[s.id] !== undefined ? invEdits[s.id] : s.stock_quantity;
  const canSync    = invHasLocation && !!s.shopify_inventory_item_id;
  const syncTitle  = !invHasLocation ? 'No Shopify location configured' : !s.shopify_inventory_item_id ? 'SKU not linked to Shopify — ask admin to run a lookup' : '';
  const syncedAt   = s.last_synced_at ? `<div class="synced-at">Synced ${fmtDate(s.last_synced_at)}</div>` : `<div class="synced-at" style="color:#d97706">Not yet synced</div>`;
  return `
    <tr id="inv-row-${s.id}">
      <td><strong>${esc(s.sku)}</strong></td>
      <td>${esc(s.product_title || '—')}</td>
      <td>
        <input type="number" min="0" class="inv-qty-input" id="qty-${s.id}"
          value="${esc(currentQty)}"
          oninput="invEdits[${s.id}]=this.value">
      </td>
      <td>${syncedAt}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="saveStock(${s.id}, this)" id="save-btn-${s.id}">Save</button>
        <button class="btn btn-primary btn-sm" onclick="syncStock(${s.id}, this)" id="sync-btn-${s.id}"
          ${canSync ? '' : `disabled title="${esc(syncTitle)}"`}>↑ Sync</button>
      </td>
    </tr>
  `;
}

async function saveStock(skuId, btn) {
  const input = document.getElementById('qty-' + skuId);
  const qty   = parseInt(input.value, 10);
  if (isNaN(qty) || qty < 0) { toast('Enter a valid non-negative number', 'error'); return; }

  btn.disabled    = true;
  btn.textContent = '…';
  try {
    await api(`/api/supplier/inventory/${skuId}`, {
      method: 'PATCH',
      body: JSON.stringify({ stock_quantity: qty }),
    });
    invEdits[skuId] = qty;
    toast('Stock saved locally', 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save';
  }
}

async function syncStock(skuId, btn) {
  btn.disabled    = true;
  btn.textContent = '…';
  try {
    // Save current input value first
    const input = document.getElementById('qty-' + skuId);
    const qty   = parseInt(input.value, 10);
    if (!isNaN(qty) && qty >= 0) {
      await api(`/api/supplier/inventory/${skuId}`, {
        method: 'PATCH',
        body: JSON.stringify({ stock_quantity: qty }),
      });
    }

    const r = await api(`/api/supplier/inventory/${skuId}/sync`, { method: 'POST' });
    invEdits[skuId] = r.stock_quantity;

    // Update synced_at in row without full reload
    const row = document.getElementById('inv-row-' + skuId);
    if (row) {
      const syncedCell = row.querySelectorAll('td')[3];
      syncedCell.innerHTML = `<div class="synced-at">Synced ${fmtDate(r.synced_at)}</div>`;
    }
    toast(`Synced ${r.stock_quantity} units to Shopify`, 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = '↑ Sync';
  }
}

async function syncAllInventory(btn) {
  if (!confirm('Sync all SKUs to Shopify using the currently saved stock quantities?')) return;
  btn.disabled    = true;
  btn.textContent = 'Syncing…';

  // Save any pending edits first, then trigger per-SKU syncs
  const rows = document.querySelectorAll('#inv-tbody tr');
  let synced = 0, skipped = 0, failed = 0;
  for (const row of rows) {
    const id = row.id.replace('inv-row-', '');
    if (!id) continue;
    const syncBtn = document.getElementById('sync-btn-' + id);
    if (!syncBtn || syncBtn.disabled) { skipped++; continue; }
    try {
      const input = document.getElementById('qty-' + id);
      const qty   = parseInt(input?.value, 10);
      if (!isNaN(qty) && qty >= 0) {
        await api(`/api/supplier/inventory/${id}`, { method: 'PATCH', body: JSON.stringify({ stock_quantity: qty }) });
      }
      const r = await api(`/api/supplier/inventory/${id}/sync`, { method: 'POST' });
      const syncedCell = row.querySelectorAll('td')[3];
      if (syncedCell) syncedCell.innerHTML = `<div class="synced-at">Synced ${fmtDate(r.synced_at)}</div>`;
      synced++;
    } catch(e) {
      failed++;
    }
  }

  btn.disabled    = false;
  btn.textContent = '↑ Sync All to Shopify';

  const parts = [];
  if (synced)  parts.push(`${synced} synced`);
  if (skipped) parts.push(`${skipped} skipped`);
  if (failed)  parts.push(`${failed} failed`);
  toast(parts.join(', ') || 'Nothing to sync', failed ? 'error' : 'success');
}
</script>
